<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadwal Shift</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900&family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>

/* ╔══════════════════════════════════════════╗
   ║  DESIGN SYSTEM — Soft Neumorphic         ║
   ╚══════════════════════════════════════════╝ */
:root {
  --bg:        #E8ECF1;
  --surface:   #E8ECF1;
  --card:      #EEF1F6;

  /* neumorphic shadows */
  --sh-out:    6px 6px 14px #C8CDD6, -6px -6px 14px #FFFFFF;
  --sh-in:     inset 3px 3px 8px #C8CDD6, inset -3px -3px 8px #FFFFFF;
  --sh-sm:     3px 3px 8px #C8CDD6, -3px -3px 8px #FFFFFF;
  --sh-press:  inset 2px 2px 5px #C8CDD6, inset -2px -2px 5px #FFFFFF;

  --ink:       #3A4355;
  --ink2:      #6B7A90;
  --ink3:      #9BA8BB;
  --accent:    #6C63FF;
  --accent-lt: rgba(108,99,255,.12);

  /* shift colors — pastel soft */
  --pagi-bg:   #FFF8E7; --pagi-fg:  #B07B2A; --pagi-bd: #FFD980;
  --sore-bg:   #E7F3FF; --sore-fg:  #2A6BB0; --sore-bd: #80C4FF;
  --malam-bg:  #EEE7FF; --malam-fg: #5A2AB0; --malam-bd: #C4A0FF;
  --libur-bg:  #FFE7EE; --libur-fg: #B02A50; --libur-bd: #FFA0BB;

  --today-bar: #6C63FF;
  --today-bg:  rgba(108,99,255,.07);
  --holi-red:  #E05A7A;

  --r:   18px;
  --rs:  12px;
  --rx:  8px;
}

/* ── THEMES ── */

/* ── SNOW ── */
body.th-snow {
  --bg:#DDE8F5; --surface:#DDE8F5; --card:#E4EDF8;
  --sh-out:6px 6px 14px #BCC9DC,-6px -6px 14px #FEFEFF;
  --sh-in:inset 3px 3px 8px #BCC9DC,inset -3px -3px 8px #FEFEFF;
  --sh-sm:3px 3px 8px #BCC9DC,-3px -3px 8px #FEFEFF;
  --sh-press:inset 2px 2px 5px #BCC9DC,inset -2px -2px 5px #FEFEFF;
  --ink:#1E3A5A; --ink2:#4A6A8A; --ink3:#85A5C5; --accent:#2980D0; --accent-lt:rgba(41,128,208,.12);
  --pagi-bg:#E0FAFF; --pagi-fg:#0A6070; --pagi-bd:#70D8F0;
  --sore-bg:#E0EEFF; --sore-fg:#0A3070; --sore-bd:#70A0F0;
  --malam-bg:#EEE0FF; --malam-fg:#400A70; --malam-bd:#B070F0;
  --libur-bg:#FFE0EE; --libur-fg:#700A30; --libur-bd:#F070A0;
  --today-bar:#2980D0; --today-bg:rgba(41,128,208,.07); --holi-red:#D04060;
}
body.th-snow .header { background-image:linear-gradient(135deg,rgba(41,128,208,.1) 0%,var(--card) 60%); }

/* ── HALLOWEEN ── */
body.th-halloween {
  --bg:#1A0F05; --surface:#1A0F05; --card:#201408;
  --sh-out:4px 4px 10px #0D0803,-4px -4px 10px #2C1C0A;
  --sh-in:inset 3px 3px 7px #0D0803,inset -3px -3px 7px #2C1C0A;
  --sh-sm:3px 3px 7px #0D0803,-3px -3px 7px #2C1C0A;
  --sh-press:inset 2px 2px 5px #0D0803,inset -2px -2px 5px #2C1C0A;
  --ink:#F0D8A0; --ink2:#C89050; --ink3:#806030; --accent:#F07020; --accent-lt:rgba(240,112,32,.12);
  --pagi-bg:#2A1400; --pagi-fg:#F0A050; --pagi-bd:#A05018;
  --sore-bg:#180A30; --sore-fg:#C090F0; --sore-bd:#6030A0;
  --malam-bg:#100808; --malam-fg:#D08050; --malam-bd:#703010;
  --libur-bg:#2A0808; --libur-fg:#F08080; --libur-bd:#A02020;
  --today-bar:#F07020; --today-bg:rgba(240,112,32,.1); --holi-red:#F06060;
}
body.th-halloween .header { background-image:linear-gradient(135deg,rgba(240,112,32,.14) 0%,var(--card) 60%); }

/* ── FOREST ── */
body.th-forest {
  --bg:#D8EAD8; --surface:#D8EAD8; --card:#DEEEDE;
  --sh-out:6px 6px 14px #B8C8B8,-6px -6px 14px #F8FFF8;
  --sh-in:inset 3px 3px 8px #B8C8B8,inset -3px -3px 8px #F8FFF8;
  --sh-sm:3px 3px 8px #B8C8B8,-3px -3px 8px #F8FFF8;
  --sh-press:inset 2px 2px 5px #B8C8B8,inset -2px -2px 5px #F8FFF8;
  --ink:#1A3A1A; --ink2:#3A6A3A; --ink3:#70A070; --accent:#2E7D32; --accent-lt:rgba(46,125,50,.12);
  --pagi-bg:#E0FFF0; --pagi-fg:#0A5030; --pagi-bd:#70D0A0;
  --sore-bg:#E8FFE0; --sore-fg:#205010; --sore-bd:#80C870;
  --malam-bg:#F0FFE0; --malam-fg:#305810; --malam-bd:#A0D860;
  --libur-bg:#FFE8E0; --libur-fg:#502010; --libur-bd:#F0A080;
  --today-bar:#2E7D32; --today-bg:rgba(46,125,50,.07); --holi-red:#C84040;
}
body.th-forest .header { background-image:linear-gradient(135deg,rgba(46,125,50,.1) 0%,var(--card) 60%); }

/* ── ISLAMIC — krem pastel hangat ── */
body.th-islamic {
  --bg:#F0E6D0; --surface:#F0E6D0; --card:#F5ECD8;
  --sh-out:6px 6px 14px #D0C0A0,-6px -6px 14px #FFFFF8;
  --sh-in:inset 3px 3px 8px #D0C0A0,inset -3px -3px 8px #FFFFF8;
  --sh-sm:3px 3px 8px #D0C0A0,-3px -3px 8px #FFFFF8;
  --sh-press:inset 2px 2px 5px #D0C0A0,inset -2px -2px 5px #FFFFF8;
  --ink:#2A1800; --ink2:#7A4818; --ink3:#C08848; --accent:#C8580A; --accent-lt:rgba(200,88,10,.12);
  --pagi-bg:#FFF3DC; --pagi-fg:#7A3800; --pagi-bd:#F0A840;
  --sore-bg:#FFE8D8; --sore-fg:#6A2808; --sore-bd:#F08060;
  --malam-bg:#F8E8FF; --malam-fg:#480868; --malam-bd:#C880E8;
  --libur-bg:#E8F5E8; --libur-fg:#1A4820; --libur-bd:#80C880;
  --today-bar:#C8580A; --today-bg:rgba(200,88,10,.07); --holi-red:#C83010;
}
body.th-islamic .header { background-image:linear-gradient(135deg,rgba(200,88,10,.12) 0%,var(--card) 60%); }

/* ── SPACE — ungu lavender gelap ── */
body.th-space {
  --bg:#1A1428; --surface:#1A1428; --card:#201830;
  --sh-out:4px 4px 10px #100C1A,-4px -4px 10px #2A2040;
  --sh-in:inset 3px 3px 7px #100C1A,inset -3px -3px 7px #2A2040;
  --sh-sm:3px 3px 7px #100C1A,-3px -3px 7px #2A2040;
  --sh-press:inset 2px 2px 5px #100C1A,inset -2px -2px 5px #2A2040;
  --ink:#E0D8F8; --ink2:#A090D0; --ink3:#604880; --accent:#9B6DFA; --accent-lt:rgba(155,109,250,.12);
  --pagi-bg:#2A1A40; --pagi-fg:#E0B8FF; --pagi-bd:#9050D0;
  --sore-bg:#1A1038; --sore-fg:#C0A8FF; --sore-bd:#6840B8;
  --malam-bg:#280E3A; --malam-fg:#F0B8E8; --malam-bd:#B04898;
  --libur-bg:#1A2830; --libur-fg:#90D0E8; --libur-bd:#3888A8;
  --today-bar:#9B6DFA; --today-bg:rgba(155,109,250,.12); --holi-red:#E060A0;
}
body.th-space .header { background-image:linear-gradient(135deg,rgba(155,109,250,.18) 0%,var(--card) 60%); }

/* ── CHRISTMAS ── */
body.th-xmas {
  --bg:#F0D8D8; --surface:#F0D8D8; --card:#F5DEDE;
  --sh-out:6px 6px 14px #D0B8B8,-6px -6px 14px #FFFEFE;
  --sh-in:inset 3px 3px 8px #D0B8B8,inset -3px -3px 8px #FFFEFE;
  --sh-sm:3px 3px 8px #D0B8B8,-3px -3px 8px #FFFEFE;
  --sh-press:inset 2px 2px 5px #D0B8B8,inset -2px -2px 5px #FFFEFE;
  --ink:#3A0A0A; --ink2:#8A2A2A; --ink3:#C07070; --accent:#C62828; --accent-lt:rgba(198,40,40,.12);
  --pagi-bg:#FFEEEE; --pagi-fg:#900A0A; --pagi-bd:#F09090;
  --sore-bg:#E8FFE8; --sore-fg:#0A500A; --sore-bd:#80D080;
  --malam-bg:#FFFFE0; --malam-fg:#505000; --malam-bd:#D0D040;
  --libur-bg:#EEE0FF; --libur-fg:#300A60; --libur-bd:#A070D0;
  --today-bar:#C62828; --today-bg:rgba(198,40,40,.07); --holi-red:#C62828;
}
body.th-xmas .header { background-image:linear-gradient(135deg,rgba(198,40,40,.1) 0%,rgba(46,125,50,.08) 100%); }

/* ── DARK ── */
body.th-dark {
  --bg:#141420; --surface:#141420; --card:#181824;
  --sh-out:4px 4px 10px #0C0C16,-4px -4px 10px #202030;
  --sh-in:inset 3px 3px 7px #0C0C16,inset -3px -3px 7px #202030;
  --sh-sm:3px 3px 7px #0C0C16,-3px -3px 7px #202030;
  --sh-press:inset 2px 2px 5px #0C0C16,inset -2px -2px 5px #202030;
  --ink:#D8D8F0; --ink2:#8080A8; --ink3:#404060; --accent:#7C6DFA; --accent-lt:rgba(124,109,250,.12);
  --pagi-bg:#201800; --pagi-fg:#D0A830; --pagi-bd:#806810;
  --sore-bg:#080C20; --sore-fg:#80A8E0; --sore-bd:#203870;
  --malam-bg:#100818; --malam-fg:#B080D8; --malam-bd:#503080;
  --libur-bg:#180808; --libur-fg:#D08080; --libur-bd:#701818;
  --today-bar:#7C6DFA; --today-bg:rgba(124,109,250,.1); --holi-red:#D06080;
}
body.th-dark .header { background-image:linear-gradient(135deg,rgba(124,109,250,.12) 0%,var(--card) 60%); }

/* ╔══════════════════════════════════════════╗
   ║  BASE                                    ║
   ╚══════════════════════════════════════════╝ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Nunito', system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  transition: background .45s, color .45s;
}
.page {
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 16px 80px;
}
.app-shell {
  border-radius: var(--r);
  box-shadow: var(--sh-out);
  overflow: hidden;
  margin-bottom: 20px;
}

/* ╔══════════════════════════════════════════╗
   ║  HEADER — compact neumorphic              ║
   ╚══════════════════════════════════════════╝ */
.header {
  border-radius: var(--r) var(--r) 0 0;
  box-shadow: var(--sh-out);
  margin-bottom: 0;
  overflow: hidden;
  position: relative;
  background: var(--card);
  min-height: 150px;
}

/* illustration canvas layers */
.hdr-sky   { position:absolute; inset:0; z-index:0; }
.hdr-mid   { position:absolute; inset:0; z-index:1; pointer-events:none; }
.hdr-fore  { position:absolute; inset:0; z-index:2; pointer-events:none; }
.hdr-glow  { position:absolute; inset:0; z-index:3; pointer-events:none;
             background:linear-gradient(to top, rgba(0,0,0,.62) 0%, rgba(0,0,0,.15) 50%, transparent 100%); }

.hdr-body {
  padding: 22px 20px 20px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 12px;
  position: relative;
  z-index: 4;
  min-height: 150px;
}
.hdr-body {
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 4;
  min-height: 150px;
}
.hdr-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 0;
  animation: fadeUp .5s .05s cubic-bezier(.34,1.1,.64,1) both;
}
.hdr-eyebrow {
  font-family: 'Montserrat', sans-serif;
  font-size: .68rem; font-weight: 600;
  letter-spacing: 5px;
  color: rgba(255,255,255,.72);
  margin-bottom: 3px;
  text-transform: uppercase;
  text-shadow: 0 1px 8px rgba(0,0,0,.5);
}
.hdr-title {
  font-family: 'Montserrat', sans-serif;
  font-size: .68rem; font-weight: 600;
  color: rgba(255,255,255,.72);
  line-height: 1.3;
  letter-spacing: 6px;
  text-transform: uppercase;
  text-shadow: 0 1px 10px rgba(0,0,0,.5);
}
.hdr-title em { font-style: normal; }
.hdr-divider {
  width: 38px; height: 1.5px;
  background: rgba(255,255,255,.4);
  border-radius: 2px;
  margin: 8px auto 7px;
}
.hdr-month {
  font-family: 'Montserrat', sans-serif;
  font-size: .85rem; font-weight: 800;
  color: #ffffff;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  text-shadow: 0 2px 16px rgba(0,0,0,.6), 0 1px 4px rgba(0,0,0,.4);
}


/* ╔══════════════════════════════════════════╗
   ║  CONTROLS                                ║
   ╚══════════════════════════════════════════╝ */
.ctrl {
  border-radius: 0;
  box-shadow: none;
  background: var(--card);
  padding: 16px 16px 14px;
  margin-bottom: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* Row 1: month navigation */
.ctrl-nav {
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.nav-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  box-shadow: var(--sh-sm);
  background: var(--card);
  border: none;
  color: var(--ink2);
  font-size: 1.05rem; font-weight: 900;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: box-shadow .18s, transform .18s;
  flex-shrink: 0;
}
.nav-btn:hover  { box-shadow: var(--sh-out); transform: scale(1.06); }
.nav-btn:active { box-shadow: var(--sh-press); transform: scale(.96); }

.month-pick-wrap {
  position: relative;
  display: flex; align-items: center;
}
.month-label {
  padding: 9px 20px;
  border-radius: 100px;
  box-shadow: var(--sh-in);
  background: var(--card);
  font-size: .88rem; font-weight: 800;
  color: var(--ink);
  white-space: nowrap;
  min-width: 148px;
  text-align: center;
}
.month-pick-wrap input[type=month] {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer;
  width: 100%; border: none; background: none;
}

/* Row 2: action buttons */
.ctrl-act { display: flex; gap: 10px; }
.ctrl-btn {
  flex: 1;
  padding: 11px 12px;
  border-radius: var(--rs);
  box-shadow: var(--sh-sm);
  background: var(--card);
  border: none;
  color: var(--ink2);
  font-family: 'Nunito', sans-serif;
  font-size: .82rem; font-weight: 800;
  cursor: pointer;
  display: flex; align-items: center; justify-content: space-between; gap: 6px;
  transition: box-shadow .18s, transform .18s, color .18s;
}
.ctrl-btn:hover  { box-shadow: var(--sh-out); color: var(--accent); transform: translateY(-1px); }
.ctrl-btn:active { box-shadow: var(--sh-press); transform: translateY(0); }
.ctrl-btn-l { display: flex; align-items: center; gap: 6px; }
.ctrl-btn-arr { font-size: .72rem; opacity: .45; }

/* ╔══════════════════════════════════════════╗
   ║  TABLE CARD                              ║
   ╚══════════════════════════════════════════╝ */
.table-card {
  border-radius: 0 0 var(--r) var(--r);
  box-shadow: var(--sh-out);
  background: var(--card);
  overflow: hidden;
  margin-bottom: 20px;
}

.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; table-layout: fixed; }

thead th {
  padding: 11px 6px;
  font-size: .64rem; font-weight: 800;
  text-transform: uppercase; letter-spacing: .9px;
  color: var(--ink3);
  background: var(--card);
  border-bottom: 1.5px solid rgba(0,0,0,.05);
  text-align: center; white-space: nowrap;
}
body.th-halloween thead th,
body.th-space thead th,
body.th-dark thead th { border-bottom-color: rgba(255,255,255,.05); }

thead th:first-child { text-align: left; padding-left: 16px; width: 96px; }
thead th:not(:first-child) { border-left: 1px solid rgba(0,0,0,.04); }
body.th-halloween thead th:not(:first-child),
body.th-space thead th:not(:first-child),
body.th-dark thead th:not(:first-child) { border-left-color: rgba(255,255,255,.04); }

/* rows */
tbody tr {
  cursor: pointer;
  border-bottom: 1px solid rgba(0,0,0,.04);
  transition: background .1s;
}
body.th-halloween tbody tr,
body.th-space tbody tr,
body.th-dark tbody tr { border-bottom-color: rgba(255,255,255,.04); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(108,99,255,.04); }

tbody tr.is-today {
  background: var(--today-bg) !important;
}
tbody tr.is-today td.dc {
  border-left: 3px solid var(--today-bar);
  padding-left: 13px !important;
}
tbody tr.is-sel {
  background: var(--accent-lt) !important;
}
tbody tr.is-holi td { background: rgba(224,90,122,.04); }
body.th-halloween tbody tr.is-holi td,
body.th-space tbody tr.is-holi td,
body.th-dark tbody tr.is-holi td { background: rgba(224,90,122,.08) !important; }

/* date cell */
td.dc {
  padding: 10px 6px 10px 16px;
  text-align: left; vertical-align: top;
  min-width: 90px;
}
.dc-row { display: flex; align-items: baseline; gap: 5px; }
.dc-num {
  font-size: .95rem; font-weight: 900;
  color: var(--ink); line-height: 1; min-width: 22px;
}
.dc-day {
  font-size: .6rem; font-weight: 700;
  color: var(--ink3); text-transform: uppercase; letter-spacing: .5px;
}
.dc-sun .dc-num, .dc-sun .dc-day { color: var(--holi-red) !important; }

.lbl-today {
  display: inline-flex; align-items: center;
  margin-top: 3px; padding: 2px 7px;
  border-radius: 100px;
  font-size: .54rem; font-weight: 800; letter-spacing: .5px; text-transform: uppercase;
  background: var(--today-bar); color: #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,.18);
}
.holi-nm {
  display: block; margin-top: 3px;
  font-size: .58rem; font-weight: 700;
  color: var(--holi-red); line-height: 1.35;
  max-width: 80px; white-space: normal;
}

/* shift cells */
td.sc {
  text-align: center; padding: 8px 4px;
  border-left: 1px solid rgba(0,0,0,.04);
  vertical-align: middle;
}
body.th-halloween td.sc,
body.th-space td.sc,
body.th-dark td.sc { border-left-color: rgba(255,255,255,.04); }

/* ╔══════════════════════════════════════════╗
   ║  BADGES — soft neumorphic pills          ║
   ╚══════════════════════════════════════════╝ */
.badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 66px; padding: 5px 0;
  border-radius: 100px;
  font-weight: 800; font-size: .68rem;
  border: 1.5px solid transparent;
  transition: transform .15s, box-shadow .15s;
  /* neumorphic badge */
  box-shadow: 2px 2px 5px rgba(0,0,0,.08), -1px -1px 4px rgba(255,255,255,.6);
}
body.th-halloween .badge,
body.th-space .badge,
body.th-dark .badge {
  box-shadow: 2px 2px 5px rgba(0,0,0,.3), -1px -1px 4px rgba(255,255,255,.03);
}
tbody tr:hover .badge { transform: scale(1.06); }

.pagi  { background:var(--pagi-bg);  color:var(--pagi-fg);  border-color:var(--pagi-bd);  }
.sore  { background:var(--sore-bg);  color:var(--sore-fg);  border-color:var(--sore-bd);  }
.malam { background:var(--malam-bg); color:var(--malam-fg); border-color:var(--malam-bd); }
.libur { background:var(--libur-bg); color:var(--libur-fg); border-color:var(--libur-bd); }

/* ╔══════════════════════════════════════════╗
   ║  PDF BUTTON                              ║
   ╚══════════════════════════════════════════╝ */
.pdf-btn {
  width: 100%;
  padding: 15px;
  border-radius: var(--r);
  border: none;
  background: var(--accent);
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: .95rem; font-weight: 900;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  letter-spacing: .3px;
  box-shadow: 4px 4px 12px rgba(0,0,0,.18), -2px -2px 8px rgba(255,255,255,.15),
              0 4px 20px color-mix(in srgb, var(--accent) 40%, transparent);
  transition: box-shadow .2s, transform .15s, filter .15s;
  margin-bottom: 20px;
}
.pdf-btn:hover  { filter: brightness(1.08); transform: translateY(-2px); box-shadow: 6px 6px 18px rgba(0,0,0,.22), -2px -2px 10px rgba(255,255,255,.15), 0 8px 28px color-mix(in srgb, var(--accent) 45%, transparent); }
.pdf-btn:active { transform: translateY(0); filter: brightness(.98); }

/* ╔══════════════════════════════════════════╗
   ║  FOOTER                                  ║
   ╚══════════════════════════════════════════╝ */
.footer {
  text-align: center;
  font-size: .68rem; color: var(--ink3); font-weight: 600;
  padding-bottom: 8px;
}
.footer b { color: var(--ink2); }

/* ╔══════════════════════════════════════════╗
   ║  BOTTOM SHEETS                           ║
   ╚══════════════════════════════════════════╝ */
.sheet-ov {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.35);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 200;
  justify-content: center; align-items: flex-end;
}
.sheet {
  background: var(--card);
  border-radius: 28px 28px 0 0;
  width: 100%; max-width: 480px;
  padding-bottom: 32px;
  box-shadow: 0 -8px 40px rgba(0,0,0,.2);
  animation: sheetUp .32s cubic-bezier(.34,1.3,.64,1) both;
}
@keyframes sheetUp { from{transform:translateY(100%); opacity:.6} to{transform:translateY(0); opacity:1} }

.sheet-handle { width: 38px; height: 4px; border-radius: 2px; background: var(--ink3); opacity: .3; margin: 14px auto 0; }
.sheet-title { font-size: 1rem; font-weight: 900; color: var(--ink); padding: 16px 22px 0; }
.sheet-sub { font-size: .72rem; color: var(--ink2); padding: 3px 22px 14px; font-weight: 600; }
.sheet-divider { height: 1px; background: rgba(0,0,0,.06); margin: 0 18px 16px; }
body.th-halloween .sheet-divider,
body.th-space .sheet-divider,
body.th-dark .sheet-divider { background: rgba(255,255,255,.06); }

/* theme grid */
.theme-grid { display: grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:0 16px; }
.tg {
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  padding: 14px 6px;
  border-radius: var(--rs);
  border: none;
  box-shadow: var(--sh-sm);
  background: var(--card);

}
.tg:hover { box-shadow: var(--sh-out); transform: translateY(-2px); }
.tg.on { box-shadow: var(--sh-in); }
.tg-emoji { font-size: 1.7rem; line-height: 1; }
.tg-name { font-size: .62rem; font-weight: 800; color: var(--ink2); text-align: center; letter-spacing: .3px; }
.tg.on .tg-name { color: var(--accent); }

/* shift form rows */
.sg {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 22px;
  border-bottom: 1px solid rgba(0,0,0,.05);
}
body.th-halloween .sg,
body.th-space .sg,
body.th-dark .sg { border-bottom-color: rgba(255,255,255,.05); }
.sg:last-of-type { border-bottom: none; }
.sg-lbl { display: flex; align-items: center; gap: 9px; font-size: .85rem; font-weight: 800; color: var(--ink); }
.sg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.m-sel {
  appearance: none;
  background: var(--card);
  box-shadow: var(--sh-in);
  border: none;
  border-radius: var(--rx);
  color: var(--ink);
  font-family: 'Nunito', sans-serif;
  font-size: .78rem; font-weight: 700;
  padding: 7px 28px 7px 11px; cursor: pointer;
  min-width: 118px; outline: none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239BA8BB' stroke-width='2.5'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
  background-repeat: no-repeat; background-position: right 7px center; background-size: 11px;
  transition: box-shadow .15s;
}
.m-sel:focus { box-shadow: var(--sh-press); }

.sheet-footer { display: flex; gap: 10px; padding: 14px 16px 0; }
.sh-btn {
  flex: 1; padding: 12px;
  border-radius: var(--rs);
  box-shadow: var(--sh-sm);
  background: var(--card);
  border: none;
  color: var(--ink2);
  font-family: 'Nunito', sans-serif;
  font-size: .82rem; font-weight: 800;
  cursor: pointer;
  transition: box-shadow .18s, transform .15s, color .18s;
}
.sh-btn:hover  { box-shadow: var(--sh-out); color: var(--accent); transform: translateY(-1px); }
.sh-btn:active { box-shadow: var(--sh-press); }
.sh-btn.primary {
  background: var(--accent); color: #fff;
  box-shadow: 3px 3px 10px rgba(0,0,0,.18), 0 4px 16px color-mix(in srgb, var(--accent) 40%, transparent);
}
.sh-btn.primary:hover { filter: brightness(1.08); color:#fff; }

/* ── ROW ANIMATION ── */
@keyframes rIn { from{opacity:0;transform:translateX(-5px)} to{opacity:1;transform:translateX(0)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.app-shell { animation: fadeUp .4s cubic-bezier(.34,1.1,.64,1) both; }
.pdf-btn   { animation: fadeUp .4s .12s cubic-bezier(.34,1.1,.64,1) both; }

/* ── RESPONSIVE ── */

}
</style>
</head>

<script>
/* ══════════════════════════════════════════
   HEADER CANVAS — cinematic painted worlds
══════════════════════════════════════════ */
function renderIllus(theme) {
  const canvas = document.getElementById('hdrCanvas');
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  const W = rect.width  || canvas.offsetWidth  || 480;
  const H = rect.height || canvas.offsetHeight || 180;
  canvas.width  = W * (window.devicePixelRatio || 1);
  canvas.height = H * (window.devicePixelRatio || 1);
  const ctx = canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
  ctx.clearRect(0, 0, W, H);
  const fn = PAINTERS[theme] || PAINTERS.default;
  fn(ctx, W, H);
}

const PAINTERS = {

  /* ─────────────────────────────────────
     DEFAULT — purple dusk, soft clouds
  ───────────────────────────────────── */
  default(ctx, W, H) {
    // sky
    const sky = ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,   '#2D1B4E');
    sky.addColorStop(0.4, '#6B3FA0');
    sky.addColorStop(0.75,'#C878C8');
    sky.addColorStop(1,   '#F0C0E8');
    ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);
    // moon glow
    const mg = ctx.createRadialGradient(W*.78,H*.22,2, W*.78,H*.22,55);
    mg.addColorStop(0,'rgba(255,245,200,1)');
    mg.addColorStop(0.15,'rgba(255,230,150,.8)');
    mg.addColorStop(0.5,'rgba(200,150,220,.3)');
    mg.addColorStop(1,'transparent');
    ctx.fillStyle = mg; ctx.fillRect(0,0,W,H);
    // moon
    ctx.beginPath(); ctx.arc(W*.78,H*.22,14,0,Math.PI*2);
    ctx.fillStyle='#FFF8DC'; ctx.fill();
    ctx.beginPath(); ctx.arc(W*.78+7,H*.22-5,11,0,Math.PI*2);
    ctx.fillStyle='#6B3FA0'; ctx.fill();
    // clouds
    function cloud(x,y,s,a){
      ctx.save(); ctx.globalAlpha=a;
      ctx.fillStyle='rgba(255,255,255,1)';
      ctx.filter='blur(8px)';
      ctx.beginPath(); ctx.ellipse(x,y,s*1.6,s*.55,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x-s*.5,y+s*.1,s*.9,s*.45,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x+s*.6,y+s*.05,s*.8,s*.4,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    cloud(W*.15,H*.28,32,.18); cloud(W*.35,H*.18,24,.12);
    cloud(W*.6,H*.32,28,.15);
    // stars
    const stars=[[.05,.12],[.12,.06],[.22,.15],[.32,.08],[.45,.18],[.52,.05],[.62,.1]];
    stars.forEach(([sx,sy])=>{
      ctx.beginPath(); ctx.arc(sx*W,sy*H,1.1,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,220,.8)'; ctx.fill();
    });
    // hills
    const hill = ctx.createLinearGradient(0,H*.7,0,H);
    hill.addColorStop(0,'#3D1A5C'); hill.addColorStop(1,'#1A0A2E');
    ctx.fillStyle=hill;
    ctx.beginPath(); ctx.moveTo(0,H);
    ctx.bezierCurveTo(W*.1,H*.65, W*.25,H*.55, W*.4,H*.72);
    ctx.bezierCurveTo(W*.55,H*.88, W*.7,H*.6, W*.85,H*.7);
    ctx.bezierCurveTo(W*.93,H*.75, W,H*.68, W,H*.72);
    ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
  },

  /* ─────────────────────────────────────
     ISLAMIC — senja masjid, atmospheric
  ───────────────────────────────────── */
  islamic(ctx, W, H) {
    // sky gradient — deep blue top to burning orange horizon
    const sky = ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,   '#0A1020');
    sky.addColorStop(0.25,'#1A2A50');
    sky.addColorStop(0.5, '#8B3500');
    sky.addColorStop(0.75,'#E86A00');
    sky.addColorStop(0.88,'#F5A020');
    sky.addColorStop(1,   '#FDD060');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // sun glow at horizon right
    const sun = ctx.createRadialGradient(W*.72,H,0, W*.72,H,H*.95);
    sun.addColorStop(0,   'rgba(255,240,150,.95)');
    sun.addColorStop(0.08,'rgba(255,200,80,.7)');
    sun.addColorStop(0.22,'rgba(240,130,20,.4)');
    sun.addColorStop(0.5, 'rgba(200,80,0,.15)');
    sun.addColorStop(1,   'transparent');
    ctx.fillStyle=sun; ctx.fillRect(0,0,W,H);

    // second warm glow spread
    const glow2 = ctx.createRadialGradient(W*.5,H,0, W*.5,H,W*.7);
    glow2.addColorStop(0,  'rgba(255,180,60,.35)');
    glow2.addColorStop(0.4,'rgba(220,100,20,.15)');
    glow2.addColorStop(1,  'transparent');
    ctx.fillStyle=glow2; ctx.fillRect(0,0,W,H);

    // atmospheric haze bands near horizon
    ctx.save(); ctx.filter='blur(12px)';
    ctx.fillStyle='rgba(255,200,80,.12)';
    ctx.fillRect(0, H*.62, W, H*.22);
    ctx.fillStyle='rgba(255,160,40,.08)';
    ctx.fillRect(0, H*.72, W, H*.2);
    ctx.restore();

    // crescent moon — top left
    ctx.save();
    // moon glow
    const mg = ctx.createRadialGradient(W*.14,H*.18,0, W*.14,H*.18,28);
    mg.addColorStop(0,'rgba(255,240,160,.5)');
    mg.addColorStop(1,'transparent');
    ctx.fillStyle=mg; ctx.fillRect(0,0,W,H);
    // moon body
    ctx.beginPath(); ctx.arc(W*.14,H*.18,11,0,Math.PI*2);
    ctx.fillStyle='#FFE8A0'; ctx.fill();
    // shadow to make crescent
    ctx.beginPath(); ctx.arc(W*.14+6,H*.18-4,9,0,Math.PI*2);
    ctx.fillStyle='#1A2A50'; ctx.fill();
    ctx.restore();

    // stars
    const strs=[[.04,.08],[.09,.04],[.18,.12],[.28,.06],[.38,.14],[.48,.04],[.55,.1],[.06,.22],[.22,.26],[.32,.2]];
    strs.forEach(([sx,sy],i)=>{
      const r = i%3===0?1.4:i%3===1?.9:.6;
      ctx.beginPath(); ctx.arc(sx*W,sy*H,r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,200,${.5+i%3*.15})`; ctx.fill();
    });

    // ── distant city haze (blurred mid layer) ──
    ctx.save(); ctx.filter='blur(4px)'; ctx.globalAlpha=.45;
    const distHill = ctx.createLinearGradient(0,H*.7,0,H);
    distHill.addColorStop(0,'rgba(40,15,0,.0)');
    distHill.addColorStop(1,'rgba(20,5,0,.9)');
    ctx.fillStyle=distHill;
    // rolling distant hills
    ctx.beginPath(); ctx.moveTo(0,H);
    ctx.bezierCurveTo(W*.08,H*.75, W*.18,H*.68, W*.28,H*.74);
    ctx.bezierCurveTo(W*.38,H*.8,  W*.48,H*.7,  W*.58,H*.76);
    ctx.bezierCurveTo(W*.68,H*.82, W*.8,H*.72,  W,H*.78);
    ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
    // tiny distant domes
    [[.3,.7],[.45,.67],[.6,.72],[.72,.69]].forEach(([dx,dy])=>{
      ctx.beginPath(); ctx.arc(dx*W,dy*H,6,Math.PI,0); ctx.fillRect(dx*W-4,dy*H,8,10); ctx.fill();
    });
    ctx.restore();

    // ── MAIN MOSQUE SILHOUETTE ──
    ctx.save();
    const mosqueColor = '#120500';
    const mc2 = '#0A0200';
    ctx.fillStyle = mosqueColor;

    // ground
    ctx.fillStyle='#0A0200';
    ctx.fillRect(0, H*.88, W, H*.12);

    // ground warm glow
    ctx.save(); ctx.filter='blur(6px)';
    ctx.fillStyle='rgba(200,90,10,.22)';
    ctx.fillRect(0,H*.84,W,H*.1);
    ctx.restore();

    ctx.fillStyle = mosqueColor;

    // left palm tree trunk
    ctx.save();
    ctx.strokeStyle='#150600'; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(W*.06,H); ctx.quadraticCurveTo(W*.04,H*.6,W*.03,H*.38); ctx.stroke();
    // fronds
    [[-.12,-.15],[-.05,-.2],[.04,-.18],[.1,-.12],[.13,-.06],[-.14,-.08]].forEach(([dx,dy])=>{
      ctx.beginPath();
      ctx.moveTo(W*.03,H*.38);
      ctx.quadraticCurveTo(W*(.03+dx*.5),H*(.38+dy*.5),W*(.03+dx),H*(.38+dy));
      ctx.lineWidth=2.5; ctx.stroke();
      // leaf tip
      ctx.save(); ctx.filter='blur(.5px)';
      ctx.beginPath(); ctx.ellipse(W*(.03+dx),H*(.38+dy),5,2.5,Math.atan2(dy,dx),0,Math.PI*2);
      ctx.fillStyle='#150600'; ctx.fill();
      ctx.restore();
    });
    ctx.restore();

    // mosque base
    const mX = W*.42, mW = W*.38, mY = H*.42;

    // main body
    ctx.fillStyle=mosqueColor;
    ctx.fillRect(mX, H*.72, mW, H*.16);

    // main dome
    ctx.beginPath();
    ctx.moveTo(mX+mW*.18, H*.72);
    ctx.bezierCurveTo(mX+mW*.18,H*.42, mX+mW*.82,H*.42, mX+mW*.82,H*.72);
    ctx.fill();

    // drum
    ctx.fillRect(mX+mW*.22, H*.7, mW*.6, H*.04);

    // side domes
    ctx.beginPath();
    ctx.moveTo(mX+mW*.03,H*.72);
    ctx.bezierCurveTo(mX+mW*.03,H*.57, mX+mW*.22,H*.57, mX+mW*.22,H*.72);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(mX+mW*.78,H*.72);
    ctx.bezierCurveTo(mX+mW*.78,H*.57, mX+mW*.97,H*.57, mX+mW*.97,H*.72);
    ctx.fill();

    // entrance arch
    ctx.fillStyle=mc2;
    ctx.beginPath();
    ctx.moveTo(mX+mW*.38,H*.88);
    ctx.lineTo(mX+mW*.38,H*.78);
    ctx.quadraticCurveTo(mX+mW*.5,H*.72, mX+mW*.62,H*.78);
    ctx.lineTo(mX+mW*.62,H*.88);
    ctx.fill();

    // side windows
    [[.12,.78,.2,.84],[.8,.78,.88,.84]].forEach(([x1,y1,x2,y2])=>{
      ctx.beginPath();
      ctx.moveTo(mX+mW*x1, H*y2);
      ctx.lineTo(mX+mW*x1, H*(y1+.02));
      ctx.quadraticCurveTo(mX+mW*((x1+x2)/2),H*(y1-.01),mX+mW*x2,H*(y1+.02));
      ctx.lineTo(mX+mW*x2, H*y2);
      ctx.fillStyle=mc2; ctx.fill();
    });

    ctx.fillStyle=mosqueColor;
    // LEFT minaret
    const lmX = mX - mW*.08;
    ctx.fillRect(lmX, H*.32, W*.022, H*.56);
    // minaret top cap
    ctx.beginPath(); ctx.moveTo(lmX-2, H*.32);
    ctx.lineTo(lmX+W*.011, H*.22);
    ctx.lineTo(lmX+W*.022+2, H*.32); ctx.fill();
    // minaret balcony
    ctx.fillRect(lmX-3, H*.48, W*.022+6, H*.02);
    // finial
    ctx.beginPath(); ctx.arc(lmX+W*.011, H*.2, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(lmX+W*.009, H*.14, 3, H*.07);
    // crescent on minaret
    ctx.beginPath(); ctx.arc(lmX+W*.011+1,H*.13,3.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=mc2;
    ctx.beginPath(); ctx.arc(lmX+W*.011+3,H*.12,2.8,0,Math.PI*2); ctx.fill();

    ctx.fillStyle=mosqueColor;
    // RIGHT minaret
    const rmX = mX + mW + mW*.06 - W*.022;
    ctx.fillRect(rmX, H*.32, W*.022, H*.56);
    ctx.beginPath(); ctx.moveTo(rmX-2,H*.32);
    ctx.lineTo(rmX+W*.011,H*.22);
    ctx.lineTo(rmX+W*.022+2,H*.32); ctx.fill();
    ctx.fillRect(rmX-3, H*.48, W*.022+6, H*.02);
    ctx.beginPath(); ctx.arc(rmX+W*.011,H*.2,3,0,Math.PI*2); ctx.fill();
    ctx.fillRect(rmX+W*.009,H*.14,3,H*.07);
    ctx.beginPath(); ctx.arc(rmX+W*.011+1,H*.13,3.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=mc2;
    ctx.beginPath(); ctx.arc(rmX+W*.011+3,H*.12,2.8,0,Math.PI*2); ctx.fill();

    // main dome finial + crescent
    ctx.fillStyle=mosqueColor;
    ctx.fillRect(mX+mW*.49, H*.3, 3, H*.13);
    ctx.beginPath(); ctx.arc(mX+mW*.5,H*.28,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(mX+mW*.5+1,H*.25,4.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=mc2;
    ctx.beginPath(); ctx.arc(mX+mW*.5+3,H*.24,3.6,0,Math.PI*2); ctx.fill();

    ctx.restore();

    // final horizon overlay glow
    ctx.save(); ctx.filter='blur(18px)';
    ctx.fillStyle='rgba(240,150,30,.18)';
    ctx.fillRect(0,H*.75,W,H*.25);
    ctx.restore();
  },

  /* ─────────────────────────────────────
     SNOW — winter forest, bokeh, sun glow
  ───────────────────────────────────── */
  snow(ctx, W, H) {
    // sky — bright icy blue teal top, white glow bottom-right
    const sky = ctx.createLinearGradient(0,0,W,H);
    sky.addColorStop(0,   '#2A6090');
    sky.addColorStop(0.3, '#4A90B8');
    sky.addColorStop(0.65,'#88C8DC');
    sky.addColorStop(1,   '#C8E8F0');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // sun glow — bright right side
    const sun = ctx.createRadialGradient(W*.88, H*.3, 0, W*.88, H*.3, W*.6);
    sun.addColorStop(0,   'rgba(255,255,255,.95)');
    sun.addColorStop(0.08,'rgba(240,252,255,.7)');
    sun.addColorStop(0.25,'rgba(200,238,248,.35)');
    sun.addColorStop(0.6, 'rgba(160,210,235,.1)');
    sun.addColorStop(1,   'transparent');
    ctx.fillStyle=sun; ctx.fillRect(0,0,W,H);

    // soft clouds mid-sky
    ctx.save(); ctx.filter='blur(14px)'; ctx.globalAlpha=.3;
    ctx.fillStyle='rgba(255,255,255,1)';
    [[.15,.3,55],[.42,.22,42],[.65,.28,48],[.82,.18,38]].forEach(([cx,cy,r])=>{
      ctx.beginPath(); ctx.ellipse(cx*W,cy*H,r*2,r*.6,0,0,Math.PI*2); ctx.fill();
    });
    ctx.restore();

    // bokeh circles — blurred light orbs
    ctx.save(); ctx.filter='blur(5px)';
    const bokehs = [
      [.18,.15,.022,.7],[.32,.08,.016,.55],[.48,.2,.02,.65],[.6,.1,.018,.5],
      [.72,.18,.025,.6],[.85,.08,.014,.45],[.12,.32,.012,.4],[.55,.28,.015,.5],
      [.4,.35,.01,.35],[.78,.32,.013,.4],[.25,.42,.011,.35],[.9,.25,.016,.45],
    ];
    bokehs.forEach(([bx,by,br,ba])=>{
      ctx.beginPath(); ctx.arc(bx*W, by*H, br*W, 0, Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${ba})`; ctx.fill();
    });
    ctx.restore();

    // snowflake sparkles (star shape)
    [[.08,.12],[.22,.06],[.38,.14],[.55,.07],[.68,.16],[.15,.22],[.42,.25],[.78,.1]].forEach(([sx,sy],i)=>{
      const x=sx*W, y=sy*H, s=2.5+i%3*.8;
      ctx.save(); ctx.translate(x,y); ctx.strokeStyle=`rgba(255,255,255,${.7+i%3*.1})`; ctx.lineWidth=1.2;
      for(let a=0;a<4;a++){
        ctx.save(); ctx.rotate(a*Math.PI/4);
        ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(0,s); ctx.stroke();
        ctx.restore();
      }
      // center dot
      ctx.beginPath(); ctx.arc(0,0,1,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();
      ctx.restore();
    });

    // ── BACKGROUND pine trees (blurred, icy)
    ctx.save(); ctx.filter='blur(3px)'; ctx.globalAlpha=.55;
    function snowPine(x, h, w, col='rgba(160,210,230,.9)'){
      ctx.fillStyle=col;
      ctx.beginPath(); ctx.moveTo(x,H); ctx.lineTo(x,H-h*.2);
      ctx.lineTo(x-w*.45,H-h*.22); ctx.lineTo(x,H-h*.44);
      ctx.lineTo(x-w*.35,H-h*.46); ctx.lineTo(x,H-h*.66);
      ctx.lineTo(x-w*.22,H-h*.68); ctx.lineTo(x,H-h);
      ctx.lineTo(x+w*.22,H-h*.68); ctx.lineTo(x+w*.35,H-h*.66);
      ctx.lineTo(x,H-h*.46); ctx.lineTo(x+w*.45,H-h*.44);
      ctx.lineTo(x,H-h*.22); ctx.lineTo(x+w*.45,H-h*.22);
      ctx.lineTo(x,H); ctx.fill();
      // snow on each tier
      ctx.fillStyle='rgba(255,255,255,.85)';
      [[1,.16],[.72,.38],[.45,.6],[.22,.76]].forEach(([tw,ty])=>{
        ctx.beginPath(); ctx.moveTo(x,H-h*ty);
        ctx.lineTo(x-w*tw*.38,H-h*(ty+.12));
        ctx.lineTo(x+w*tw*.38,H-h*(ty+.12));
        ctx.fill();
      });
    }
    snowPine(-W*.02,H*.72,28,'rgba(140,195,218,.8)');
    snowPine(W*.08, H*.62,22,'rgba(150,200,222,.8)');
    snowPine(W*.78, H*.68,24,'rgba(140,195,218,.8)');
    snowPine(W*.9,  H*.58,20,'rgba(150,200,222,.8)');
    snowPine(W*.97, H*.66,18,'rgba(140,195,218,.75)');
    ctx.restore();

    // ── FOREGROUND pine trees (crisp, darker blue-white)
    function frontPine(x, h, w){
      ctx.fillStyle='rgba(80,140,175,.95)';
      ctx.beginPath(); ctx.moveTo(x,H); ctx.lineTo(x,H-h*.18);
      ctx.lineTo(x-w*.48,H-h*.2); ctx.lineTo(x,H-h*.42);
      ctx.lineTo(x-w*.38,H-h*.44); ctx.lineTo(x,H-h*.65);
      ctx.lineTo(x-w*.25,H-h*.67); ctx.lineTo(x,H-h);
      ctx.lineTo(x+w*.25,H-h*.67); ctx.lineTo(x+w*.38,H-h*.65);
      ctx.lineTo(x,H-h*.44); ctx.lineTo(x+w*.48,H-h*.42);
      ctx.lineTo(x,H-h*.2); ctx.lineTo(x+w*.48,H-h*.2);
      ctx.lineTo(x,H); ctx.fill();
      // heavy snow on tiers
      ctx.fillStyle='rgba(230,245,255,.95)';
      [[1,.14,.42],[.72,.34,.35],[.45,.56,.26],[.22,.74,.16]].forEach(([tw,ty,cov])=>{
        ctx.beginPath(); ctx.moveTo(x,H-h*ty);
        ctx.lineTo(x-w*cov*1.1, H-h*(ty+.14));
        ctx.lineTo(x+w*cov*1.1, H-h*(ty+.14));
        ctx.fill();
      });
    }
    frontPine(-W*.04, H*.88, 32);
    frontPine(W*.14,  H*.78, 26);
    frontPine(W*.84,  H*.82, 28);
    frontPine(W*1.02, H*.9,  30);

    // falling snow particles
    for(let i=0;i<30;i++){
      const x=(i*83+17)%W, y=(i*47+9)%(H*.82)+5;
      const r=.8+((i*11)%4)*.35, a=.35+((i*7)%5)*.1;
      ctx.save(); ctx.filter='blur(.5px)';
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.fill();
      ctx.restore();
    }

    // snow ground — wide, bright, slightly bumpy
    const sg=ctx.createLinearGradient(0,H*.72,0,H);
    sg.addColorStop(0,'rgba(200,232,245,.0)');
    sg.addColorStop(0.3,'rgba(220,240,252,.85)');
    sg.addColorStop(1,'rgba(245,252,255,1)');
    ctx.fillStyle=sg;
    ctx.beginPath(); ctx.moveTo(0,H);
    ctx.bezierCurveTo(W*.18,H*.75, W*.38,H*.8,  W*.55,H*.74);
    ctx.bezierCurveTo(W*.72,H*.68, W*.88,H*.76, W,H*.72);
    ctx.lineTo(W,H); ctx.fill();

    // mist at tree base
    ctx.save(); ctx.filter='blur(12px)'; ctx.globalAlpha=.3;
    ctx.fillStyle='rgba(200,235,248,1)';
    ctx.fillRect(0,H*.62,W,H*.18); ctx.restore();
  },

  /* ─────────────────────────────────────
     HALLOWEEN — dark night, castle
  ───────────────────────────────────── */
  halloween(ctx, W, H) {
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#050200'); sky.addColorStop(0.4,'#2A0D00');
    sky.addColorStop(0.75,'#7A2800'); sky.addColorStop(1,'#C05000');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
    // big moon
    const mg=ctx.createRadialGradient(W*.72,H*.22,0,W*.72,H*.22,60);
    mg.addColorStop(0,'rgba(255,200,80,.7)'); mg.addColorStop(1,'transparent');
    ctx.fillStyle=mg; ctx.fillRect(0,0,W,H);
    ctx.beginPath(); ctx.arc(W*.72,H*.22,26,0,Math.PI*2);
    ctx.fillStyle='#FF9A00'; ctx.fill();
    ctx.beginPath(); ctx.arc(W*.72,H*.22,22,0,Math.PI*2);
    ctx.fillStyle='#FFB020'; ctx.fill();
    // moon craters
    ctx.fillStyle='rgba(180,80,0,.25)';
    [[-.3,-.2,4],[.2,.3,3],[-.1,.1,2.5]].forEach(([dx,dy,r])=>{
      ctx.beginPath(); ctx.arc(W*.72+dx*22,H*.22+dy*22,r,0,Math.PI*2); ctx.fill();
    });
    // bats
    [[.25,.18],[.4,.12],[.55,.22],[.15,.3]].forEach(([bx,by],i)=>{
      ctx.save(); ctx.translate(bx*W,by*H); ctx.fillStyle='#0D0500';
      const s=i%2===0?.7:1;
      ctx.beginPath();
      ctx.moveTo(0,0); ctx.bezierCurveTo(-6*s,-8*s,-14*s,-6*s,-18*s,0);
      ctx.bezierCurveTo(-14*s,4*s,-8*s,2*s,0,0);
      ctx.bezierCurveTo(8*s,2*s,14*s,4*s,18*s,0);
      ctx.bezierCurveTo(14*s,-6*s,6*s,-8*s,0,0);
      ctx.fill(); ctx.restore();
    });
    // stars
    for(let i=0;i<18;i++){
      ctx.beginPath(); ctx.arc(((i*83+7)%W), ((i*47+11)%(H*.6))+5, .7+i%3*.3, 0, Math.PI*2);
      ctx.fillStyle=`rgba(255,180,50,${.3+i%4*.1})`; ctx.fill();
    }
    // castle silhouette
    ctx.fillStyle='#080200';
    // castle body
    ctx.fillRect(W*.32,H*.45,W*.36,H*.55);
    // battlements
    for(let i=0;i<7;i++) ctx.fillRect(W*(.32+i*.052),H*.38,W*.032,H*.09);
    // towers
    ctx.fillRect(W*.28,H*.35,W*.08,H*.65);
    ctx.fillRect(W*.64,H*.35,W*.08,H*.65);
    for(let i=0;i<3;i++) ctx.fillRect(W*(.28+i*.027),H*.28,W*.024,H*.09);
    for(let i=0;i<3;i++) ctx.fillRect(W*(.64+i*.027),H*.28,W*.024,H*.09);
    // windows glow
    ctx.fillStyle='rgba(255,150,0,.45)';
    [[.42,.52],[.52,.52],[.42,.62],[.52,.62]].forEach(([wx,wy])=>{
      ctx.beginPath(); ctx.arc(wx*W,wy*H,4,Math.PI,0); ctx.fillRect(wx*W-4,wy*H,8,8); ctx.fill();
    });
    // ground
    ctx.fillStyle='#050100';
    ctx.beginPath(); ctx.moveTo(0,H);
    ctx.bezierCurveTo(W*.2,H*.82,W*.4,H*.88,W*.6,H*.82);
    ctx.bezierCurveTo(W*.8,H*.78,W,H*.85,W,H); ctx.fill();
  },

  /* ─────────────────────────────────────
     FOREST — moonlit trees, mist
  ───────────────────────────────────── */
  forest(ctx, W, H) {
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#0A1A0A'); sky.addColorStop(0.4,'#1A3A1A');
    sky.addColorStop(0.75,'#2A5A28'); sky.addColorStop(1,'#3A6A30');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
    // moon glow
    const mg=ctx.createRadialGradient(W*.18,H*.18,0,W*.18,H*.18,55);
    mg.addColorStop(0,'rgba(255,255,220,.65)'); mg.addColorStop(1,'transparent');
    ctx.fillStyle=mg; ctx.fillRect(0,0,W,H);
    ctx.beginPath(); ctx.arc(W*.18,H*.18,18,0,Math.PI*2);
    ctx.fillStyle='#FFFCE8'; ctx.fill();
    // stars
    for(let i=0;i<16;i++){
      ctx.beginPath(); ctx.arc(((i*89+13)%W),((i*41+7)%(H*.55))+5,.8+i%3*.3,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,255,200,${.35+i%4*.1})`; ctx.fill();
    }
    // mist
    ctx.save(); ctx.filter='blur(16px)'; ctx.globalAlpha=.25;
    ctx.fillStyle='#80C880';
    ctx.beginPath(); ctx.ellipse(W*.3,H*.78,W*.4,H*.15,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(W*.75,H*.82,W*.35,H*.12,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
    // back trees
    ctx.save(); ctx.filter='blur(2.5px)'; ctx.globalAlpha=.55;
    ctx.fillStyle='#0D2010';
    function tree(x,h,w){
      ctx.beginPath(); ctx.moveTo(x,H); ctx.lineTo(x,H-h*.3);
      ctx.lineTo(x-w*.5,H-h*.3); ctx.lineTo(x,H-h*.7);
      ctx.lineTo(x-w*.35,H-h*.7); ctx.lineTo(x,H-h);
      ctx.lineTo(x+w*.35,H-h*.7); ctx.lineTo(x+w*.5,H-h*.7);
      ctx.lineTo(x,H-h*.3); ctx.lineTo(x+w*.5,H-h*.3); ctx.lineTo(x,H); ctx.fill();
    }
    [W*.15,W*.3,W*.45,W*.6,W*.75,W*.88].forEach((x,i)=>tree(x,H*(.55+i%3*.08),(18+i%3*5)));
    ctx.restore();
    // front trees
    ctx.fillStyle='#060E06';
    [[W*.05,H*.72,16],[W*.22,H*.78,14],[W*.72,H*.75,15],[W*.88,H*.8,13]].forEach(([x,h,w])=>{
      ctx.beginPath(); ctx.moveTo(x,H); ctx.lineTo(x,H-h*.35);
      ctx.lineTo(x-w,H-h*.35); ctx.lineTo(x,H-h*.72);
      ctx.lineTo(x-w*.7,H-h*.72); ctx.lineTo(x,H-h);
      ctx.lineTo(x+w*.7,H-h*.72); ctx.lineTo(x+w,H-h*.35);
      ctx.lineTo(x,H-h*.35); ctx.lineTo(x+w,H-h*.35); ctx.lineTo(x,H); ctx.fill();
    });
    // ground
    const grd=ctx.createLinearGradient(0,H*.85,0,H);
    grd.addColorStop(0,'#0A1A0A'); grd.addColorStop(1,'#050A05');
    ctx.fillStyle=grd; ctx.fillRect(0,H*.85,W,H*.15);
  },

  /* ─────────────────────────────────────
     SPACE — nebula, planet, stars
  ───────────────────────────────────── */
  space(ctx, W, H) {
    ctx.fillStyle='#08041A'; ctx.fillRect(0,0,W,H);
    // nebula layers
    const neb1=ctx.createRadialGradient(W*.7,H*.3,0,W*.7,H*.3,W*.6);
    neb1.addColorStop(0,'rgba(140,80,220,.28)'); neb1.addColorStop(1,'transparent');
    ctx.fillStyle=neb1; ctx.fillRect(0,0,W,H);
    const neb2=ctx.createRadialGradient(W*.2,H*.6,0,W*.2,H*.6,W*.5);
    neb2.addColorStop(0,'rgba(180,60,160,.18)'); neb2.addColorStop(1,'transparent');
    ctx.fillStyle=neb2; ctx.fillRect(0,0,W,H);
    const neb3=ctx.createRadialGradient(W*.5,H*.1,0,W*.5,H*.1,W*.4);
    neb3.addColorStop(0,'rgba(80,60,200,.15)'); neb3.addColorStop(1,'transparent');
    ctx.fillStyle=neb3; ctx.fillRect(0,0,W,H);
    // stars
    for(let i=0;i<60;i++){
      const x=(i*97+13)%W, y=(i*53+7)%H, r=.3+((i*7)%5)*.2;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${.3+i%5*.13})`; ctx.fill();
    }
    // bright stars
    [[.15,.12],[.42,.08],[.78,.2],[.6,.45],[.88,.35]].forEach(([sx,sy])=>{
      ctx.save();
      const sg=ctx.createRadialGradient(sx*W,sy*H,0,sx*W,sy*H,6);
      sg.addColorStop(0,'rgba(255,255,255,.9)'); sg.addColorStop(1,'transparent');
      ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);
      ctx.beginPath(); ctx.arc(sx*W,sy*H,1.5,0,Math.PI*2);
      ctx.fillStyle='white'; ctx.fill(); ctx.restore();
    });
    // planet with rings
    const pX=W*.72, pY=H*.3, pR=28;
    const pg=ctx.createRadialGradient(pX-pR*.3,pY-pR*.3,2,pX,pY,pR);
    pg.addColorStop(0,'#C090FF'); pg.addColorStop(0.5,'#8050D0'); pg.addColorStop(1,'#3A1880');
    ctx.save(); ctx.globalAlpha=.9;
    ctx.beginPath(); ctx.arc(pX,pY,pR,0,Math.PI*2);
    ctx.fillStyle=pg; ctx.fill();
    // ring back
    ctx.globalAlpha=.35;
    ctx.strokeStyle='rgba(200,160,255,.7)'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.ellipse(pX,pY,pR*2.1,pR*.45,-.2,Math.PI,Math.PI*2); ctx.stroke();
    // ring front
    ctx.globalAlpha=.55;
    ctx.beginPath(); ctx.ellipse(pX,pY,pR*2.1,pR*.45,-.2,0,Math.PI); ctx.stroke();
    ctx.restore();
    // small moon
    ctx.beginPath(); ctx.arc(W*.55,H*.42,8,0,Math.PI*2);
    ctx.fillStyle='rgba(180,150,220,.7)'; ctx.fill();
    // foreground dark rocks
    ctx.fillStyle='#05020E';
    ctx.beginPath(); ctx.moveTo(0,H);
    ctx.bezierCurveTo(W*.1,H*.82,W*.2,H*.88,W*.35,H*.78);
    ctx.bezierCurveTo(W*.5,H*.68,W*.65,H*.8,W*.8,H*.72);
    ctx.bezierCurveTo(W*.9,H*.66,W,H*.75,W,H); ctx.fill();
  },

  /* ─────────────────────────────────────
     CHRISTMAS — santa, village, moon, snow
  ───────────────────────────────────── */
  xmas(ctx, W, H) {
    // sky — deep navy to rich teal (matching reference)
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,   '#020818');
    sky.addColorStop(0.25,'#052040');
    sky.addColorStop(0.55,'#083560');
    sky.addColorStop(0.8, '#0A5878');
    sky.addColorStop(1,   '#0C6880');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // stars
    for(let i=0;i<45;i++){
      const x=(i*89+7)%W, y=(i*43+11)%(H*.58)+4;
      ctx.beginPath(); ctx.arc(x,y,.3+((i*7)%5)*.18,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${.2+((i*11)%8)*.08})`; ctx.fill();
    }

    // bright star sparkle top
    [[.28,.08],[.6,.05],[.12,.12]].forEach(([sx,sy],i)=>{
      const x=sx*W, y=sy*H, s=2+i*.5;
      ctx.save(); ctx.translate(x,y); ctx.strokeStyle=`rgba(255,255,255,${.6+i*.1})`; ctx.lineWidth=1;
      for(let a=0;a<4;a++){
        ctx.save(); ctx.rotate(a*Math.PI/4);
        ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(0,s); ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    });

    // BIG MOON — top right, glowing
    const mX=W*.82, mY=H*.22, mR=32;
    const mGlow=ctx.createRadialGradient(mX,mY,0,mX,mY,mR*2.5);
    mGlow.addColorStop(0,'rgba(220,235,255,.4)');
    mGlow.addColorStop(1,'transparent');
    ctx.fillStyle=mGlow; ctx.fillRect(0,0,W,H);
    ctx.beginPath(); ctx.arc(mX,mY,mR,0,Math.PI*2);
    const moonG=ctx.createRadialGradient(mX-8,mY-8,2,mX,mY,mR);
    moonG.addColorStop(0,'#FFFFFF'); moonG.addColorStop(0.5,'#E8F0FF'); moonG.addColorStop(1,'#C0CCEA');
    ctx.fillStyle=moonG; ctx.fill();
    // moon craters subtle
    ctx.fillStyle='rgba(160,180,220,.2)';
    [[-.25,-.2,5],[.2,.25,4],[-.1,.1,3]].forEach(([dx,dy,r])=>{
      ctx.beginPath(); ctx.arc(mX+dx*mR,mY+dy*mR,r,0,Math.PI*2); ctx.fill();
    });

    // SANTA SLEIGH silhouette in front of moon
    ctx.save();
    ctx.fillStyle='#0A0A18'; ctx.strokeStyle='#0A0A18';
    // sleigh
    const sX=W*.72, sY=H*.1;
    ctx.translate(sX,sY);
    ctx.beginPath();
    ctx.moveTo(-18,8); ctx.bezierCurveTo(-15,2,-8,0,0,2);
    ctx.bezierCurveTo(8,4,10,8,8,10);
    ctx.bezierCurveTo(4,14,-4,13,-10,10);
    ctx.bezierCurveTo(-16,7,-20,12,-18,8);
    ctx.fill();
    // santa shape on sleigh
    ctx.beginPath(); ctx.arc(-5,0,5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-5,-6,3.5,0,Math.PI*2); ctx.fill();
    // reindeer line (5 reindeer)
    ctx.lineWidth=1.5; ctx.lineCap='round';
    for(let d=0;d<5;d++){
      const rx=14+d*14, ry=-4-d*1.5;
      // body
      ctx.beginPath(); ctx.ellipse(rx,ry,5,2.5,-.15,0,Math.PI*2); ctx.fill();
      // head
      ctx.beginPath(); ctx.arc(rx+5,ry-2,2,0,Math.PI*2); ctx.fill();
      // antler
      ctx.beginPath(); ctx.moveTo(rx+5,ry-4);
      ctx.lineTo(rx+4,ry-7); ctx.lineTo(rx+3,ry-9); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(rx+4,ry-7);
      ctx.lineTo(rx+6,ry-9); ctx.stroke();
      // legs
      ctx.beginPath();
      ctx.moveTo(rx-2,ry+2); ctx.lineTo(rx-3,ry+6);
      ctx.moveTo(rx+2,ry+2); ctx.lineTo(rx+3,ry+6);
      ctx.stroke();
      // connecting line
      if(d<4){
        ctx.beginPath(); ctx.moveTo(rx+5,ry); ctx.lineTo(rx+14,ry-1.5); ctx.stroke();
      }
    }
    ctx.restore();

    // snowflakes (styled, not just circles)
    const flakes=[[.08,.15],[.18,.08],[.35,.18],[.52,.1],[.25,.28],[.45,.22],[.15,.35],[.62,.14],[.72,.28]];
    flakes.forEach(([fx,fy],i)=>{
      const x=fx*W, y=fy*H, s=3+i%3;
      ctx.save(); ctx.translate(x,y); ctx.strokeStyle=`rgba(200,230,255,${.5+i%3*.12})`; ctx.lineWidth=.8;
      for(let a=0;a<3;a++){
        ctx.save(); ctx.rotate(a*Math.PI/3);
        ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(0,s); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-s*.4,-s*.5); ctx.lineTo(s*.4,-s*.5); ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    });

    // BACKGROUND pine trees — dark teal
    ctx.save(); ctx.filter='blur(1.5px)'; ctx.globalAlpha=.8;
    function xPineBg(x,h,w){
      ctx.fillStyle='#0A3A50';
      ctx.beginPath(); ctx.moveTo(x,H); ctx.lineTo(x,H-h*.2);
      ctx.lineTo(x-w*.42,H-h*.22); ctx.lineTo(x,H-h*.46);
      ctx.lineTo(x-w*.3,H-h*.48); ctx.lineTo(x,H-h*.7);
      ctx.lineTo(x-w*.18,H-h*.72); ctx.lineTo(x,H-h);
      ctx.lineTo(x+w*.18,H-h*.72); ctx.lineTo(x+w*.3,H-h*.7);
      ctx.lineTo(x,H-h*.48); ctx.lineTo(x+w*.42,H-h*.46);
      ctx.lineTo(x,H-h*.22); ctx.lineTo(x+w*.42,H-h*.22);
      ctx.lineTo(x,H); ctx.fill();
    }
    xPineBg(W*.02, H*.65,18); xPineBg(W*.1,H*.55,15);
    xPineBg(W*.82, H*.62,17); xPineBg(W*.92,H*.52,14); xPineBg(W*.98,H*.6,16);
    ctx.restore();

    // VILLAGE — red houses with snow roofs
    function house(x,y,w,h){
      // body
      ctx.fillStyle='#8B1A1A';
      ctx.fillRect(x-w/2, y, w, h);
      // roof
      ctx.fillStyle='#6A1010';
      ctx.beginPath(); ctx.moveTo(x-w/2-3,y); ctx.lineTo(x,y-h*.55); ctx.lineTo(x+w/2+3,y); ctx.fill();
      // snow on roof
      ctx.fillStyle='rgba(220,238,255,.95)';
      ctx.beginPath(); ctx.moveTo(x-w/2,y);
      ctx.quadraticCurveTo(x,y-h*.55+4, x+w/2,y);
      ctx.fill();
      // chimney
      ctx.fillStyle='#6A1010';
      ctx.fillRect(x+w*.15,y-h*.5,w*.1,h*.3);
      ctx.fillStyle='rgba(220,238,255,.9)';
      ctx.fillRect(x+w*.12,y-h*.52,w*.16,h*.06);
      // windows
      ctx.fillStyle='rgba(255,220,120,.7)';
      ctx.beginPath(); ctx.arc(x-w*.18,y+h*.35,w*.09,Math.PI,0); ctx.fillRect(x-w*.27,y+h*.35,w*.18,h*.28); ctx.fill();
      ctx.beginPath(); ctx.arc(x+w*.18,y+h*.35,w*.09,Math.PI,0); ctx.fillRect(x+w*.09,y+h*.35,w*.18,h*.28); ctx.fill();
    }
    house(W*.28, H*.6,  38, 38);
    house(W*.42, H*.58, 32, 34);
    house(W*.54, H*.62, 28, 30);
    house(W*.65, H*.6,  34, 36);
    house(W*.38, H*.68, 24, 26);
    house(W*.58, H*.7,  22, 24);

    // FOREGROUND snow pine trees — white, prominent
    function xPineFront(x,h,w){
      ctx.fillStyle='rgba(40,90,120,.9)';
      ctx.beginPath(); ctx.moveTo(x,H); ctx.lineTo(x,H-h*.18);
      ctx.lineTo(x-w*.46,H-h*.2); ctx.lineTo(x,H-h*.42);
      ctx.lineTo(x-w*.36,H-h*.44); ctx.lineTo(x,H-h*.65);
      ctx.lineTo(x-w*.24,H-h*.67); ctx.lineTo(x,H-h);
      ctx.lineTo(x+w*.24,H-h*.67); ctx.lineTo(x+w*.36,H-h*.65);
      ctx.lineTo(x,H-h*.44); ctx.lineTo(x+w*.46,H-h*.42);
      ctx.lineTo(x,H-h*.2); ctx.lineTo(x+w*.46,H-h*.2);
      ctx.lineTo(x,H); ctx.fill();
      // snow layers — thick, like the reference
      ctx.fillStyle='rgba(225,240,255,.98)';
      [[1,.14,.46],[.72,.35,.38],[.45,.57,.28],[.22,.74,.18]].forEach(([tw,ty,cov])=>{
        ctx.beginPath(); ctx.moveTo(x,H-h*ty);
        ctx.bezierCurveTo(x-w*cov*1.2, H-h*(ty+.05), x-w*cov*.8, H-h*(ty+.15), x-w*cov*.4, H-h*(ty+.16));
        ctx.bezierCurveTo(x, H-h*(ty+.1), x+w*cov*.8, H-h*(ty+.15), x+w*cov*1.2, H-h*(ty+.05));
        ctx.lineTo(x, H-h*ty); ctx.fill();
      });
    }
    xPineFront(-W*.04, H*.9, 36);
    xPineFront(W*.18,  H*.78, 28);
    xPineFront(W*.82,  H*.8,  30);
    xPineFront(W*1.02, H*.88, 34);

    // snow ground — white rounded
    const sg=ctx.createLinearGradient(0,H*.72,0,H);
    sg.addColorStop(0,'rgba(200,225,248,.0)');
    sg.addColorStop(0.3,'rgba(215,235,255,.88)');
    sg.addColorStop(1,'rgba(240,250,255,1)');
    ctx.fillStyle=sg;
    ctx.beginPath(); ctx.moveTo(0,H);
    ctx.bezierCurveTo(W*.15,H*.78, W*.35,H*.82, W*.55,H*.76);
    ctx.bezierCurveTo(W*.75,H*.7,  W*.9,H*.78,  W,H*.74);
    ctx.lineTo(W,H); ctx.fill();
    // snow mounds
    ctx.fillStyle='rgba(228,242,255,.9)';
    ctx.beginPath(); ctx.ellipse(W*.15,H*.9,W*.14,H*.06,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(W*.78,H*.88,W*.16,H*.05,0,0,Math.PI*2); ctx.fill();

    // falling snow particles
    for(let i=0;i<20;i++){
      const x=(i*79+23)%W, y=(i*41+13)%(H*.85)+5;
      ctx.beginPath(); ctx.arc(x,y,.7+((i*9)%4)*.3,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${.4+((i*7)%4)*.1})`; ctx.fill();
    }
  },

  /* ─────────────────────────────────────
     DARK — city at night, full moon
  ───────────────────────────────────── */
  dark(ctx, W, H) {
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#03030A'); sky.addColorStop(0.5,'#07071A');
    sky.addColorStop(1,'#0E0E28');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
    // moon glow
    const mg=ctx.createRadialGradient(W*.75,H*.2,0,W*.75,H*.2,50);
    mg.addColorStop(0,'rgba(255,255,220,.55)'); mg.addColorStop(1,'transparent');
    ctx.fillStyle=mg; ctx.fillRect(0,0,W,H);
    ctx.beginPath(); ctx.arc(W*.75,H*.2,18,0,Math.PI*2);
    ctx.fillStyle='#FFFFF0'; ctx.fill();
    // moon surface detail
    ctx.fillStyle='rgba(200,200,180,.2)';
    [[-.2,-.1,4],[.15,.2,3],[-.05,.05,2]].forEach(([dx,dy,r])=>{
      ctx.beginPath(); ctx.arc(W*.75+dx*18,H*.2+dy*18,r,0,Math.PI*2); ctx.fill();
    });
    // stars
    for(let i=0;i<45;i++){
      const x=(i*89+17)%W, y=(i*41+11)%(H*.65)+5;
      const r=.3+((i*11)%8)*.16;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${.25+i%6*.1})`; ctx.fill();
    }
    // city buildings
    ctx.fillStyle='#06061A';
    const buildings=[
      [0,.55,.06,.45],[.04,.42,.05,.58],[.08,.6,.04,.4],[.12,.38,.06,.62],
      [.17,.5,.05,.5],[.21,.44,.07,.56],[.27,.62,.04,.38],[.3,.48,.05,.52],
      [.64,.52,.05,.48],[.68,.4,.06,.6],[.73,.58,.05,.42],[.77,.45,.07,.55],
      [.83,.62,.04,.38],[.86,.5,.05,.5],[.9,.44,.06,.56],[.95,.6,.05,.4]
    ];
    buildings.forEach(([x,y,w,h])=>{
      ctx.fillRect(x*W,y*H,w*W,h*H);
    });
    // windows
    buildings.forEach(([bx,by,bw,bh])=>{
      for(let wy=by+.03;wy<by+bh-.05;wy+=.07){
        for(let wx=bx+.005;wx<bx+bw-.005;wx+=.018){
          if(Math.random()>.45){
            ctx.fillStyle=`rgba(255,240,150,${.2+Math.random()*.35})`;
            ctx.fillRect(wx*W,wy*H,bw*W*.25,bh*H*.08);
          }
        }
      }
    });
    // ground reflection
    const refl=ctx.createLinearGradient(0,H*.88,0,H);
    refl.addColorStop(0,'rgba(100,100,180,.08)'); refl.addColorStop(1,'rgba(20,20,60,.4)');
    ctx.fillStyle=refl; ctx.fillRect(0,H*.88,W,H*.12);
  },

};

/* ── CORE ── */
const START   = new Date(2025,11,22);
const CYCLE   = ["Pagi","Pagi","Sore","Sore","Malam","Malam","Libur","Libur"];
const OFFSETS = {A:6,B:4,C:2,D:0};
let CY,CM,HOLI={},scrolled=false,selKey=null,rt=null;
document.getElementById('yr').textContent = new Date().getFullYear();

function calcDef(){
  const t=new Date();t.setHours(0,0,0,0);
  const s=new Date(START);s.setHours(0,0,0,0);
  const d=Math.floor((t-s)/86400000),r={};
  ['A','B','C','D'].forEach(g=>{let i=(OFFSETS[g]+d)%8;if(i<0)i+=8;r[g]=i;});
  return r;
}
let BS = JSON.parse(localStorage.getItem('bs'))||calcDef();

function getShift(g,date){
  try{
    const tgt=new Date(date);tgt.setHours(0,0,0,0);
    let idx;
    if(localStorage.getItem('bs')!==null){
      const now=new Date();now.setHours(0,0,0,0);
      idx=(BS[g]+Math.floor((tgt-now)/86400000))%8;
    }else{
      const s=new Date(START);s.setHours(0,0,0,0);
      idx=(OFFSETS[g]+Math.floor((tgt-s)/86400000))%8;
    }
    if(idx<0)idx+=8;
    const tp=CYCLE[idx],fi=CYCLE.indexOf(tp);
    return idx===fi+1?`${tp} 2`:`${tp} 1`;
  }catch{return'—';}
}
function dk(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

/* ── RENDER ── */
function sched(){clearTimeout(rt);rt=setTimeout(render,50);}
function render(){
  const tb=document.getElementById('tbody');tb.innerHTML='';
  const todK=dk(new Date()),days=new Date(CY,CM+1,0).getDate();
  for(let d=1;d<=days;d++){
    const date=new Date(CY,CM,d),key=dk(date);
    const isSun=date.getDay()===0,isTod=key===todK,isSel=key===selKey,isH=!!HOLI[key];
    const tr=document.createElement('tr');
    tr.className=['ri',isTod?'is-today':'',isSel?'is-sel':'',isH?'is-holi':''].filter(Boolean).join(' ');
    tr.style.animationDelay=`${(d-1)*.007}s`;
    tr.onclick=()=>{selKey=selKey===key?null:key;sched();};
    const dc=document.createElement('td');
    dc.className='dc'+(isSun?' dc-sun':'');
    const dn=date.toLocaleDateString('id-ID',{weekday:'short'});
    dc.innerHTML=
      `<div class="dc-row"><span class="dc-num">${String(d).padStart(2,'0')}</span><span class="dc-day">${dn}</span></div>`+
      (isTod?'<span class="lbl-today">Hari Ini</span>':'')+
      (isH?`<span class="holi-nm">🎉 ${HOLI[key]}</span>`:'');
    tr.appendChild(dc);
    ['A','B','C','D'].forEach(g=>{
      const td=document.createElement('td');td.className='sc';
      const s=getShift(g,date),tp=s.split(' ')[0].toLowerCase();
      td.innerHTML=`<span class="badge ${tp}">${s}</span>`;
      tr.appendChild(td);
    });
    tb.appendChild(tr);
    if(!scrolled&&isTod){setTimeout(()=>tr.scrollIntoView({behavior:'smooth',block:'center'}),400);scrolled=true;}
  }
}

/* ── MONTH ── */
function updHead(){
  const nm=new Date(CY,CM).toLocaleDateString('id-ID',{month:'long',year:'numeric'});
  const ns=new Date(CY,CM).toLocaleDateString('id-ID',{month:'short',year:'numeric'});
  document.getElementById('appMonth').textContent='PT. Motasa Indonesia';
  document.getElementById('monthLabel').textContent=ns;
  document.getElementById('monthPick').value=`${CY}-${String(CM+1).padStart(2,'0')}`;
}
function loadHoli(year){
  HOLI={};
  Object.keys(HOLI_DB).forEach(k=>{if(k.startsWith(String(year)))HOLI[k]=HOLI_DB[k];});
  updHead();
  try{
    const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),5000);
    fetch('https://api-harilibur.vercel.app/api?year='+year,{signal:ctrl.signal})
      .then(r=>r.ok?r.json():null).then(data=>{
        if(!data)return;
        const f={};data.forEach(i=>(i.is_national_holiday||i.is_cuti_bersama)&&(f[i.holiday_date]=i.holiday_name));
        if(Object.keys(f).length>0){HOLI=f;sched();}
      }).catch(()=>{});
  }catch{}
}
function setMonth(y,m){CY=y;CM=m;scrolled=false;loadHoli(y);sched();}
document.getElementById('prevBtn').onclick=()=>{let y=CY,m=CM-1;if(m<0){m=11;y--;}setMonth(y,m);};
document.getElementById('nextBtn').onclick=()=>{let y=CY,m=CM+1;if(m>11){m=0;y++;}setMonth(y,m);};
